{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href = "{% static 'eventapp/style.css' %}" rel = "stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Details</title>
</head>
<body>
         <h2  class="text-center mt-5 mb-2 fw-bold w-100" id = "title">{{ event.title }}</h2>
            
        

    <div class="container mt-5">
    <div class="event-detail p-4">

       

        <p class="text-muted text-center mb-4">
             {{ event.datetime|date:"F j, Y, g:i A" }}
        </p>

        <div class="d-flex align-items-start gap-3">
        <img src = "{% static 'images/pin.jpg' %}" width = "40px">
        <p class="text-center mb-2">
             {{ event.location }}
        </p>
        </div>

        <hr>

         <div class="card-body text-center">

        <img src = "{{event.image.url}}" width="500px">
        </div>
        <br>

        <p class="mt-3">
            {{ event.description }}
        </p>

    </div>

     <div class="text-center mt-4">
    <a href = "{% url 'allEvents' %}" class = "btn btn-secondary">Back to Events</a>
    </div>
</div>
    
</body>
</html>
